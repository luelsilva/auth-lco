services:
  auth-api:
    build:
      network: host
    network_mode: host
    restart: always
    environment:
      - NODE_ENV=production

  auth-frontend:
    build:
      network: host
    network_mode: host
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: lco-auth-tunnel
    restart: always
    network_mode: host
    command: tunnel --no-autoupdate run
    env_file:
      - ./backend/.env
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
